<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BM-JobLens</title>
    <link rel="stylesheet" href="font.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="popup-wrapper">

    <!-- HEADER -->
    <div class="header">
        <div class="logo-mark">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </div>
        <div class="header-text">
            <h1>BM-JobLens</h1>
            <p>KEYWORD HIGHLIGHTER</p>
        </div>
        <!-- THEME SWITCHER -->
        <div class="theme-switcher">
            <label class="switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
        </div>
        <div class="status-dot" id="statusDot"></div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content">

        <!-- AUTO-HIGHLIGHT TOGGLE -->
        <div class="auto-highlight-row">
            <label class="toggle-label" for="autoHighlightToggle">
                Auto-highlight on page load
            </label>
            <label class="switch">
                <input type="checkbox" id="autoHighlightToggle">
                <span class="slider"></span>
            </label>
        </div>

        <!-- COUNT BAR -->
        <div class="count-bar">
            <span class="section-label">Your Keywords</span>
            <span class="keyword-count" id="keywordCount">0</span>
            <button class="btn btn-primary btn-sponsorship" id="addSponsorship">Add Sponsorship Phrases</button>
        </div>

        <!-- INPUT ROW -->
        <div class="input-row">
            <label for="keywordInput"></label><input
                    class="keyword-input"
                    id="keywordInput"
                    type="text"
                    placeholder="e.g. backend, Python, remote..."
                    maxlength="50"
            />
            <button class="btn btn-primary  add-btn" id="addBtn" title="Add keyword">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>

        <!-- TAGS -->
        <div class="tags-container" id="tagsContainer">
            <div class="empty-msg" id="emptyMsg">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
                    <line x1="7" y1="7" x2="7.01" y2="7"/>
                </svg>
                Add keywords to get started
            </div>
        </div>

        <div class="divider"></div>

        <div class="actions">
            <button class="btn btn-remove-all" id="removeAllBtn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                    <path d="M10 11v6"/>
                    <path d="M14 11v6"/>
                    <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
                </svg>
                Remove All
            </button>

            <button class="btn btn-primary btn-highlight" id="highlightBtn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                    <path d="M9 11l3 3L22 4"/>
                    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                </svg>
                Highlight
            </button>
            <button class="btn btn-clear" id="clearBtn">✕ Remove highlights from page</button>
        </div>

        <div id="sponsorshipInfo"></div>
        <div class="match-info" id="matchInfo"></div>

    </div>
</div>

<div class="toast" id="toast"></div>

<!-- SPONSORSHIP MODAL -->
<div id="sponsorshipModal" class="hidden">
    <div class="modal-content">

        <h3>Sponsorship Phrases</h3>

        <label>Positive Phrases</label>
        <div class="input-row">
            <input class="keyword-input" id="positiveInput" placeholder="Enter positive phrase…"/>
            <button class="btn btn-primary" id="addPositiveBtn">Add</button>
        </div>

        <label>Negative Phrases</label>
        <div class="input-row">
            <input class="keyword-input" id="negativeInput" placeholder="Enter negative phrase…"/>
            <button class="btn btn-primary" id="addNegativeBtn">Add</button>
        </div>

        <div class="phrase-panel">
            <h3>Positive Phrases</h3>
            <div id="positivePhrases">
                <ol id="positiveList"></ol>
            </div>
        </div>

        <div class="phrase-panel">
            <h3>Negative Phrases</h3>
            <div id="negativePhrases">
                <ol id="negativeList"></ol>
            </div>
        </div>

        <button id="closeModal">Close</button>

    </div>
</div>

<script src="popup.js"></script>
</body>
</html>
